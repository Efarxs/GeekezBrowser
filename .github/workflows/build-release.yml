name: Build and Release

on:
  release:
    types:
      - published

permissions:
  contents: write

env:
  XRAY_FALLBACK_VERSION: 'v26.3.27'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM64
          - platform: macos-latest
            os: darwin
            arch: arm64
            xray_asset: Xray-macos-arm64-v8a.zip
            fc_asset: ungoogled-chromium_148.0.7778.215-1.1_macos.dmg
            build_cmd: npm run build:mac
          # macOS x64
          - platform: macos-15-intel
            os: darwin
            arch: x64
            xray_asset: Xray-macos-64.zip
            fc_asset: ungoogled-chromium_148.0.7778.215-1.1_macos.dmg
            build_cmd: npm run build:mac
          # Windows x64
          - platform: windows-latest
            os: win32
            arch: x64
            xray_asset: Xray-windows-64.zip
            fc_asset: ungoogled-chromium_148.0.7778.215-1.1_windows_x64.zip
            build_cmd: npm run build && npx electron-builder --win nsis zip --x64
          # Windows ARM64
          - platform: windows-latest
            os: win32
            arch: arm64
            xray_asset: Xray-windows-arm64-v8a.zip
            fc_asset: ungoogled-chromium_148.0.7778.215-1.1_windows_x64.zip
            build_cmd: npm run build && npx electron-builder --win nsis zip --arm64
          # Linux x64
          - platform: ubuntu-latest
            os: linux
            arch: x64
            xray_asset: Xray-linux-64.zip
            fc_asset: ungoogled-chromium-148.0.7778.215-1-x86_64_linux.tar.xz
            build_cmd: npm run build:linux
          # Linux ARM64
          - platform: ubuntu-24.04-arm
            os: linux
            arch: arm64
            xray_asset: Xray-linux-arm64-v8a.zip
            fc_asset: ungoogled-chromium-148.0.7778.215-1-x86_64_linux.tar.xz
            build_cmd: npm run build && npx electron-builder --linux --arm64

    runs-on: ${{ matrix.platform }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - run: npm ci --ignore-scripts

      - name: Get Xray version
        id: xray
        shell: bash
        run: |
          RESPONSE=$(curl -sL "https://api.github.com/repos/XTLS/Xray-core/releases/latest")
          VER=$(echo "$RESPONSE" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('tag_name',''))" 2>/dev/null || echo "")
          [ -z "$VER" ] && VER="${{ env.XRAY_FALLBACK_VERSION }}"
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Download Xray
        shell: bash
        run: |
          BIN_DIR="resources/bin/${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p "$BIN_DIR"
          curl -sL -o xray.zip "https://github.com/XTLS/Xray-core/releases/download/${{ steps.xray.outputs.version }}/${{ matrix.xray_asset }}"
          unzip -o xray.zip -d "$BIN_DIR/" && rm xray.zip
          mv "$BIN_DIR/geoip.dat" "$BIN_DIR/geosite.dat" resources/bin/ 2>/dev/null || true
          rm -f "$BIN_DIR"/{LICENSE,README.md}
          [ "${{ matrix.os }}" != "win32" ] && chmod +x "$BIN_DIR/xray" || true

      - name: Download fingerprint-chromium
        shell: bash
        run: |
          FC_VERSION="148.0.7778.215"
          FC_DIR="resources/puppeteer/chrome/fingerprint-chromium"
          mkdir -p "$FC_DIR"
          FC_URL="https://github.com/adryfish/fingerprint-chromium/releases/download/${FC_VERSION}/${{ matrix.fc_asset }}"
          curl -sL -o fc-temp.zip "$FC_URL"
          if [[ "${{ matrix.fc_asset }}" == *.zip ]]; then
            unzip -o fc-temp.zip -d "$FC_DIR/" && rm fc-temp.zip
          elif [[ "${{ matrix.fc_asset }}" == *.tar.xz ]]; then
            tar -xf fc-temp.zip -C "$FC_DIR/" && rm fc-temp.zip
          elif [[ "${{ matrix.fc_asset }}" == *.dmg ]]; then
            hdiutil attach fc-temp.zip -mountpoint /tmp/fc-dmg -nobrowse -quiet
            cp -R /tmp/fc-dmg/*.app "$FC_DIR/" 2>/dev/null || cp -R /tmp/fc-dmg/* "$FC_DIR/"
            hdiutil detach /tmp/fc-dmg -quiet
            rm fc-temp.zip
          fi
          echo "$FC_VERSION" > "$FC_DIR/VERSION"

      - name: Build
        run: ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Rename Windows portable zip
        if: matrix.os == 'win32'
        shell: bash
        run: |
          for file in dist/*.zip; do
            if [ -f "$file" ]; then
              mv "$file" "${file%.zip}-portable.zip"
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.zip
            dist/*.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Upload assets to published release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          mapfile -d '' files < <(find artifacts -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.zip' -o -name '*.AppImage' \) -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi
          gh release upload "${{ github.event.release.tag_name }}" "${files[@]}" --clobber --repo "${{ github.repository }}"
